name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build mod jars
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Fabric and NeoForge jars
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          for attempt in 1 2 3 4; do
            if ./gradlew clean :fabric:build :neoforge:build check --console=plain --max-workers=1; then
              exit 0
            fi

            if [[ "$attempt" == "4" ]]; then
              echo "Gradle build failed after $attempt attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 45))
            echo "Gradle build failed on attempt $attempt. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Collect release jars
        id: jars
        shell: bash
        run: |
          set -euo pipefail

          FABRIC_JAR="$(find fabric/build/libs -maxdepth 1 -type f -name 'pick-your-bed-*-fabric.jar' | sort | tail -n 1)"
          NEOFORGE_JAR="$(find neoforge/build/libs -maxdepth 1 -type f -name 'pick-your-bed-*-neoforge.jar' | sort | tail -n 1)"

          if [[ -z "$FABRIC_JAR" || ! -f "$FABRIC_JAR" ]]; then
            echo "Fabric jar was not found." >&2
            exit 1
          fi

          if [[ -z "$NEOFORGE_JAR" || ! -f "$NEOFORGE_JAR" ]]; then
            echo "NeoForge jar was not found." >&2
            exit 1
          fi

          {
            echo "fabric_jar=$FABRIC_JAR"
            echo "neoforge_jar=$NEOFORGE_JAR"
            echo "fabric_name=$(basename "$FABRIC_JAR")"
            echo "neoforge_name=$(basename "$NEOFORGE_JAR")"
          } >> "$GITHUB_OUTPUT"

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        with:
          name: pick-your-bed-jars
          path: |
            ${{ steps.jars.outputs.fabric_jar }}
            ${{ steps.jars.outputs.neoforge_jar }}
          if-no-files-found: error

      - name: Send Discord build notification
        if: ${{ github.event_name != 'pull_request' }}
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          FABRIC_JAR: ${{ steps.jars.outputs.fabric_jar }}
          NEOFORGE_JAR: ${{ steps.jars.outputs.neoforge_jar }}
          FABRIC_NAME: ${{ steps.jars.outputs.fabric_name }}
          NEOFORGE_NAME: ${{ steps.jars.outputs.neoforge_name }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK secret is not configured; skipping Discord notification."
            exit 0
          fi

          COMMIT_MESSAGE="$(git log -1 --pretty=%B | head -n 1)"
          VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
          export COMMIT_MESSAGE
          export VERSION

          python3 - <<'PY'
          import json
          import os

          sha = os.environ["SHA"]
          repo = os.environ["REPOSITORY"]
          commit_url = f"https://github.com/{repo}/commit/{sha}"
          releases_url = "https://github.com/elliekplays/Pick-Your-Bed/releases"

          payload = {
              "embeds": [
                  {
                      "title": "Build Complete",
                      "url": os.environ["RUN_URL"],
                      "description": f"Download the mod files below or visit [GitHub Releases]({releases_url}).",
                      "color": 5814783,
                      "author": {
                          "name": f"By: {os.environ['ACTOR']}",
                          "icon_url": f"https://github.com/{os.environ['ACTOR']}.png",
                      },
                      "fields": [
                          {
                              "name": "Version",
                              "value": f"`{os.environ['VERSION']}`",
                              "inline": True,
                          },
                          {
                              "name": "Branch",
                              "value": f"`{os.environ['BRANCH']}`",
                              "inline": True,
                          },
                          {
                              "name": "Commit",
                              "value": f"[`{sha[:7]}`]({commit_url})",
                              "inline": True,
                          },
                          {
                              "name": "Message",
                              "value": (os.environ["COMMIT_MESSAGE"] or "No commit message")[:1024],
                              "inline": False,
                          },
                          {
                              "name": "Jars",
                              "value": f"`{os.environ['FABRIC_NAME']}`\n`{os.environ['NEOFORGE_NAME']}`",
                              "inline": False,
                          },
                      ],
                      "footer": {
                          "text": "GitHub Actions CI",
                      },
                  }
              ],
          }

          files_payload = {
              "content": "Built jars:",
          }

          with open("discord-payload.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, ensure_ascii=True, separators=(",", ":"))

          with open("discord-files-payload.json", "w", encoding="utf-8") as file:
              json.dump(files_payload, file, ensure_ascii=True, separators=(",", ":"))
          PY

          curl --fail --show-error --silent \
            --header "Content-Type: application/json" \
            --data @discord-payload.json \
            "$WEBHOOK_URL"

          sleep 1

          curl --fail --show-error --silent \
            -F "payload_json=<discord-files-payload.json" \
            -F "files[0]=@${FABRIC_JAR}" \
            -F "files[1]=@${NEOFORGE_JAR}" \
            "$WEBHOOK_URL"
