name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build mod
        run: ./gradlew build

      # =========================
      # Get metadata
      # =========================
      - name: Get commit info
        id: info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # =========================
      # Upload artifacts to GitHub
      # =========================
      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod
          path: fabric/build/libs/*.jar

      - name: Upload NeoForge jar
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-mod
          path: neoforge/build/libs/*.jar

      # =========================
      # Send BOTH jars to Discord
      # =========================
      - name: Send Fabric jar to Discord
        run: |
          curl -F "file=@$(ls fabric/build/libs/*.jar | head -n 1)" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send NeoForge jar to Discord
        run: |
          curl -F "file=@$(ls neoforge/build/libs/*.jar | head -n 1)" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # =========================
      # Fancy embed (FIXED JSON)
      # =========================
      - name: Send Discord embed
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          JSON=$(jq -n \
            --arg user "${{ github.actor }}" \
            --arg avatar "https://github.com/${{ github.actor }}.png" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ steps.info.outputs.sha_short }}" \
            --arg commiturl "${{ steps.info.outputs.commit_url }}" \
            --arg msg "${{ github.event.head_commit.message }}" \
            '{
              username: "Spidey Bot",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                title: "🚀 Build Complete",
                color: 5814783,
                author: {
                  name: ("By: " + $user),
                  icon_url: $avatar
                },
                fields: [
                  {
                    name: "Branch",
                    value: ("[" + $branch + "](https://github.com/'"${{ github.repository }}"'/tree/'"${{ github.ref_name }}"')"),
                    inline: true
                  },
                  {
                    name: "Commit",
                    value: ("[`" + $commit + "`](" + $commiturl + ")"),
                    inline: true
                  },
                  {
                    name: "Message",
                    value: $msg,
                    inline: false
                  }
                ],
                footer: {
                  text: "GitHub Actions CI"
                }
              }]
            }')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$JSON" \
          $WEBHOOK
