name: build

on:
  push:
  pull_request:

jobs:
  build:
    if: "!startsWith(github.event.head_commit.message, '[skip]')"
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: build project
        run: ./gradlew build

      # ─────────────────────────────
      # Upload artifacts
      # ─────────────────────────────
      - name: upload fabric
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod
          path: fabric/build/libs/*.jar

      - name: upload neoforge
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-mod
          path: neoforge/build/libs/*.jar

      # ─────────────────────────────
      # Discord (SAFE + HOTLINKED EMBED)
      # ─────────────────────────────
      - name: send discord embed + jars
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -e

          REPO="https://github.com/${{ github.repository }}"
          BRANCH_URL="${REPO}/tree/${{ github.ref_name }}"
          COMMIT_URL="${REPO}/commit/${{ github.sha }}"

          # escape commit message safely (prevents JSON break)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 200 | sed 's/"/\\"/g')

          echo "Sending Discord embed..."

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"Spidey Bot\",
            \"embeds\": [{
              \"title\": \"🚀 Build Complete\",
              \"color\": 5814783,

              \"author\": {
                \"name\": \"By: ${{ github.actor }}\",
                \"icon_url\": \"https://github.com/${{ github.actor }}.png\"
              },

              \"fields\": [
                {
                  \"name\": \"Branch\",
                  \"value\": \"[${{ github.ref_name }}](${BRANCH_URL})\",
                  \"inline\": true
                },
                {
                  \"name\": \"Commit\",
                  \"value\": \"[\`${{ github.sha }}\`](${COMMIT_URL})\",
                  \"inline\": true
                },
                {
                  \"name\": \"Message\",
                  \"value\": \"${COMMIT_MSG}\",
                  \"inline\": false
                }
              ],

              \"footer\": {
                \"text\": \"GitHub Actions CI\"
              },

              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" \
          $WEBHOOK

          echo "Uploading Fabric jar..."
          FABRIC_JAR=$(ls fabric/build/libs/*.jar | head -n 1)
          [ -f "$FABRIC_JAR" ] && curl -F "file=@$FABRIC_JAR" $WEBHOOK

          echo "Uploading NeoForge jar..."
          NEOFORGE_JAR=$(ls neoforge/build/libs/*.jar | head -n 1)
          [ -f "$NEOFORGE_JAR" ] && curl -F "file=@$NEOFORGE_JAR" $WEBHOOK
