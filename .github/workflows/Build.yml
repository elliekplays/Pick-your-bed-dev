      - name: Send Discord (final clean version)
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          FABRIC_JAR=$(ls fabric/build/libs/*.jar | head -n 1)
          NEOFORGE_JAR=$(ls neoforge/build/libs/*.jar | head -n 1)

          # Clean commit message (removes auto stuff like "Update Build.yml")
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)

          curl -X POST \
            -F "payload_json=$(jq -n \
              --arg user "${{ github.actor }}" \
              --arg avatar "https://github.com/${{ github.actor }}.png" \
              --arg branch "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              --arg msg "$COMMIT_MSG" \
              --arg repo "${{ github.repository }}" \
              '{
                username: "Spidey Bot",
                avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                embeds: [{
                  title: "🚀 Build Complete",
                  color: 5814783,
                  author: {
                    name: ("By: " + $user),
                    icon_url: $avatar
                  },
                  fields: [
                    {
                      name: "Branch",
                      value: ("`" + $branch + "`"),
                      inline: true
                    },
                    {
                      name: "Commit",
                      value: ("[`" + ($sha[0:7]) + "`](https://github.com/" + $repo + "/commit/" + $sha + ")"),
                      inline: true
                    },
                    {
                      name: "Message",
                      value: $msg,
                      inline: false
                    }
                  ],
                  footer: {
                    text: "GitHub Actions CI"
                  }
                }]
              }')" \
            -F "files[0]=@$FABRIC_JAR" \
            -F "files[1]=@$NEOFORGE_JAR" \
            $WEBHOOK
